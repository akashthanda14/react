version: "3.8"

services:
  postgres:
    image: postgres:16
    platform: linux/arm64
    container_name: akashcode_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: akashcode
      POSTGRES_PASSWORD: akashcode
      POSTGRES_DB: akashcode_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
